:root{

}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(1200px 500px at 70% -5%,rgba(255,122,47,.10),transparent 60%),linear-gradient(180deg,#14202A,#0F1920);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.5;min-height:100vh}
a{color:inherit;text-decoration:none}
.wrap{max-width:1200px;margin:0 auto;padding:0 24px}
.mono{font-family:var(--mono)}

.cover .rule{height:2px;background:linear-gradient(90deg,var(--accent),transparent 65%);margin:10px 0 16px;border-radius:2px}

.card .kick{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);margin-bottom:9px}
.card h3{font-family:var(--serif);font-size:18px;font-weight:400;line-height:1.18;letter-spacing:-.2px;margin-bottom:7px}
.card p{font-size:13.5px;color:var(--soft);line-height:1.55}
.card .body{flex:1;display:flex;flex-direction:column}

.card .body p+p{margin-top:12px}
.card p.sum{font-weight:700;color:var(--text);font-size:14.5px;line-height:1.4;margin-bottom:8px}
.card .more{margin-top:11px;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent)}
.card .more .s{color:var(--muted);font-weight:400}

.bento{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.b1{grid-column:1/3;grid-row:1/3}.b2{grid-column:3;grid-row:1}.b3{grid-column:3;grid-row:2}
.b4{grid-column:1;grid-row:3}.b5{grid-column:2;grid-row:3}.b6{grid-column:3;grid-row:3}
.b1{background:radial-gradient(700px 300px at 0% 0%,rgba(255,122,47,.14),transparent 60%),linear-gradient(180deg,var(--card),var(--card2));border-color:rgba(255,122,47,.4)}
.b1 .kick{color:var(--accent)} .b1 h3{font-size:clamp(24px,3vw,34px);line-height:1.05} .b1 p{font-size:15px}
.b1 p.sum{font-size:clamp(17px,1.7vw,20px);line-height:1.35;margin-bottom:12px}
@media(max-width:760px){.bento{grid-template-columns:1fr}.bento .card{grid-column:auto!important;grid-row:auto!important}}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid .lead{grid-column:span 2} .grid .lead h3{font-size:22px}
.grid-more{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:16px}
@media(max-width:760px){.grid{grid-template-columns:1fr}.grid .lead{grid-column:auto}.grid-more{grid-template-columns:1fr}}
@media(max-width:1000px) and (min-width:761px){.grid-more{grid-template-columns:repeat(2,1fr)}}

.feature{background:radial-gradient(800px 320px at 100% 0%,rgba(116,200,228,.12),transparent 60%),linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:18px;padding:24px}

/* .cc-row = äußeres 2-Spalten-Grid (Chancen | Risiken). .cc = je EINE der beiden

   "cc", wodurch jede Spalte selbst zum 2-Spalten-Grid wurde und Titel/Liste

.cc.ch h4{color:var(--pos)} .cc.ri h4{color:var(--neg)}

.cc li::before{content:"";position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%}
.cc.ch li::before{background:var(--pos)} .cc.ri li::before{background:var(--neg)}

.maerkte{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden}
@media(max-width:760px){.maerkte{grid-template-columns:repeat(3,1fr)}}

.mk .l{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.mk .v{font-size:15px;font-weight:700} .mk .v.pos{color:var(--pos)} .mk .v.neg{color:var(--neg)}

.pods{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

.pod{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;gap:13px;transition:transform .18s,border-color .18s,box-shadow .18s}

.pod .n{font-family:var(--serif);font-size:30px;line-height:.8;color:transparent;-webkit-text-stroke:1.2px var(--teal)}

.pod .kick{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);margin-bottom:5px}

.zitat{background:linear-gradient(120deg,rgba(116,200,228,.08),transparent);border-left:3px solid var(--teal);border-radius:0 14px 14px 0;padding:22px 26px}
.zitat blockquote{font-family:var(--serif);font-style:italic;font-size:clamp(22px,3vw,30px);line-height:1.3}
.zitat cite{display:block;margin-top:10px;font-family:var(--mono);font-size:12px;color:var(--muted);font-style:normal}

footer{border-top:1px solid var(--line);padding:24px 0 48px;font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.8}
.ribbon{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);border:1px solid rgba(255,122,47,.4);border-radius:6px;padding:3px 9px}

.pb{break-before:page}

@media print{
  @page{size:A4;margin:14mm}
  body{background:#fff;color:#111;font-size:10.5pt}
  .no-print{display:none!important} .topbar{display:none}
  .wrap{max-width:none;padding:0}
  .cover{padding:0 0 8px} .cover .meta,.cover .eyebrow{color:#555}
  .logo-img{filter:none}
  .mag{border-color:#bbb} .mag .ttl h2{color:#111} .mag .ttl .ey,.mag .tag{color:#666}
  .card,.feature,.pod{background:#faf9f7!important;border-color:#ddd!important;box-shadow:none!important;break-inside:avoid}
  .card h3,.feature h3,.pod h3,.zitat blockquote{color:#111}
  .card p,.feature .body,.cc li,.pod p{color:#333} .card .kick{color:#b8631f}
  .b1{background:#faf9f7!important;border-color:#ddd!important}
  .metrics,.maerkte{background:#ddd} .metric,.mk{background:#fff} .zitat{background:none}
}
</style>

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
/* echter Deep-Link: Artikel-URL aus den Daten, sonst Google-Suche der Überschrift (greift beim Beispiel-Briefing) */
function lnk(it){return it&&it.url?String(it.url):('https://www.google.com/search?q='+encodeURIComponent((it&&it.h)||''));}
/* === Live-Kurse direkt im Browser (Yahoo-Worker) — taggenau bei jedem Aufruf === */
const MK=[{l:'DAX',t:'^GDAXI'},{l:'Dow',t:'^DJI'},{l:'Nasdaq',t:'^IXIC'},{l:'S&P 500',t:'^GSPC'},{l:'Bitcoin',t:'BTC-EUR'},{l:'Gold',t:'GC=F'}];
let __coTicker='';
async function cfq(t){try{const r=await fetch('https://wax-kurse.calvinjohncamp.workers.dev/?ticker='+encodeURIComponent(t)+'&_='+Math.floor(Date.now()/60000));if(!r.ok)return null;const j=await r.json();const price=Number(j.price??j.regularMarketPrice??0)||null;const prev=Number(j.previousClose??j.regularMarketPreviousClose??0)||null;const pe=Number(j.trailingPE??0)||null;const mc=Number(j.marketCap??0)||null;return price?{price,prev,pe,mc}:null;}catch(e){return null;}}
function fmtPct(v){const s=v>=0?'+':'−';return s+Math.abs(v*100).toFixed(1).replace('.',',')+'%';}
// Marktkapitalisierung kompakt formatieren: ab 1 Mrd. in "Mrd. €", sonst in "Mio. €".
function fmtMarketCap(v){if(v==null||isNaN(v)||v<=0)return null;if(v>=1e9)return (v/1e9).toLocaleString('de-DE',{minimumFractionDigits:1,maximumFractionDigits:1})+' Mrd. €';return (v/1e6).toLocaleString('de-DE',{minimumFractionDigits:0,maximumFractionDigits:0})+' Mio. €';}
function fillLive(){
  const box=document.getElementById('maerkteBox');
  if(box) box.querySelectorAll('.mk').forEach(cell=>{cfq(cell.getAttribute('data-t')).then(q=>{const v=cell.querySelector('.v');if(!v)return;if(q&&q.price&&q.prev){const ch=(q.price-q.prev)/q.prev;v.textContent=fmtPct(ch);v.className='v '+(ch>=0?'pos':'neg');}else{v.textContent='—';}});});
  if(__coTicker){cfq(__coTicker).then(q=>{const m=document.getElementById('coMetrics');if(!q||!m)return;const c=m.querySelectorAll('.metric .v');if(c[0]&&q.price)c[0].textContent=q.price.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';if(c[1]&&q.prev){const ch=(q.price-q.prev)/q.prev;c[1].textContent=fmtPct(ch);c[1].className='v '+(ch>=0?'pos':'neg');}if(c[2]){const mc=fmtMarketCap(q.mc);if(mc)c[2].textContent=mc;}if(c[3]&&q.pe)c[3].textContent=q.pe.toLocaleString('de-DE',{minimumFractionDigits:1,maximumFractionDigits:1});});}
}
function cardHTML(it,extra){
  const sum=it.sum?`<p class="sum">${esc(it.sum)}</p>`:'';
  // Der Aufmacher (erkennbar an "sum") schreibt seinen tieferen Text in 2 Absätzen
  // (getrennt durch Leerzeile). Beide Absätze stehen in einem gemeinsamen
  // ".body"-Wrapper (flex:1) statt selbst flex:1 zu bekommen — sonst verteilt
  // der Flexbox-Algorithmus den Restplatz GLEICHMÄSSIG auf beide <p>, was bei
  // unterschiedlich langen Absätzen eine hässliche Lücke MITTEN im Text erzeugt.
  const paras=it.sum?String(it.p||'').split(/\n\s*\n/).map(s=>`<p>${esc(s.trim())}</p>`).join(''):`<p>${esc(it.p)}</p>`;
  const body=`<div class="body">${paras}</div>`;
  return `<a class="card ${extra||''}" href="${esc(lnk(it))}" target="_blank" rel="noopener noreferrer"><div class="kick">${esc(it.kick)}</div><h3>${esc(it.h)}</h3>${sum}${body}<span class="more">Weiterlesen → <span class="s">${esc(it.src)}</span></span></a>`;
}
function magHTML(no,ey,title,tag){return `<div class="mag"><div class="num">${esc(no)}</div><div class="ttl"><div class="ey">${esc(ey)}</div><h2>${esc(title)}</h2></div><span class="tag">${esc(tag)}</span></div>`;}
function ressortHTML(r){
  const main=r.items.slice(0,2).map((it,i)=>cardHTML(it,i===0?'lead':'')).join('');
  const restItems=r.items.slice(2,6);
  const more=restItems.length?`<div class="grid-more">${restItems.map(it=>cardHTML(it,'')).join('')}</div>`:'';
  return `<section class="ressort" id="${r.id}">${magHTML(r.no,r.ey,r.title,r.tag)}<div class="grid">${main}</div>${more}</section>`;
}
function maerkteHTML(){return `<div class="maerkte" id="maerkteBox">${MK.map(m=>`<div class="mk" data-t="${esc(m.t)}"><div class="l">${esc(m.l)}</div><div class="v">·</div></div>`).join('')}</div>`;}
function featureHTML(u){
  const met=u.metrics.map(m=>`<div class="metric"><div class="l">${esc(m.l)}</div><div class="v ${m.cls||''}">${esc(m.v)}</div></div>`).join('');
  const ch=u.chancen.map(x=>`<li>${esc(x)}</li>`).join(''); const ri=u.risiken.map(x=>`<li>${esc(x)}</li>`).join('');
  return `<section class="ressort" id="unternehmen">${magHTML(u.no,'Spezial','Unternehmen des Tages','Aktie · Bewertung · Potenzial')}
    <div class="feature"><div class="ft"><div><h3>${esc(u.name)}</h3><div class="sub">${esc(u.sub)}</div></div><span class="chip-warn">Beispiel — keine Anlageberatung</span></div>
    <div class="metrics" id="coMetrics">${met}</div><p class="body">${esc(u.body)}</p>
    <div class="cc-row"><div class="cc ch"><h4>Chancen</h4><ul>${ch}</ul></div><div class="cc ri"><h4>Risiken</h4><ul>${ri}</ul></div></div>
    <a class="more" style="display:inline-block;margin-top:14px;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--teal)" href="${esc(u.url||('https://www.google.com/search?q='+encodeURIComponent((u.name||'')+' Aktie')))}" target="_blank" rel="noopener noreferrer">Analystenstimmen &amp; Chart → <span style="color:var(--muted)">Quelle</span></a></div></section>`;
}
function render(d){
  const R=d.ressorts; let html='';
  // Headlines (Bento)
  const b=['b1','b2','b3','b4','b5','b6'];
  html+=`<section class="ressort" id="heisser">${magHTML('★','Aufmacher','Headlines','Top 6 · quer durch alles')}<div class="bento">${d.heisser.slice(0,6).map((it,i)=>cardHTML(it,b[i])).join('')}</div></section>`;
  ORDER.forEach(k=>{
    if(k==='__pb'){html+='<div class="pb"></div>';return;}
    if(k==='__unternehmen'){html+=featureHTML(d.unternehmen);return;}
    const r=Object.assign({id:k},R[k]); let s=ressortHTML(r);
    if(k==='boerse'){s=s.replace('</section>',maerkteHTML()+'</section>');}
    html+=s;
  });
  // Podcasts
  const podsFixHTML=d.podcastsFix.map(p=>`<a class="pod fix" href="${esc(p.url)}" target="_blank" rel="noopener"><div><div class="kick">${esc(p.s)}</div><h3>${esc(p.h)}</h3><p>${esc(p.p)}</p><span class="cta">▶ Spotify</span></div></a>`).join('');
  // Fallback auf Spotify-Suche nur als Übergangsschutz, solange der Worker mit dem alten
  // Podcast-Schema (ohne "url") noch nicht neu deployt ist — siehe worker.js PODCAST_POOL.
  const podsHTML=d.podcasts.slice(0,6).map((p,i)=>`<a class="pod" href="${esc(p.url||('https://open.spotify.com/search/'+encodeURIComponent(p.h||'')))}" target="_blank" rel="noopener"><div class="n">${i+1}</div><div>${p.s?`<div class="kick">${esc(p.s)}</div>`:''}<h3>${esc(p.h)}</h3><p>${esc(p.p)}</p><span class="cta">▶ Spotify</span></div></a>`).join('');
  html+=`<section class="ressort" id="podcasts">${magHTML('🎧','Zum Reinhören','Unsere Podcast-Empfehlungen','3 Favoriten · 6 Tagestipps')}<div class="pods">${podsFixHTML}${podsHTML}</div></section>`;
  // Zitat
  html+=`<section class="ressort" id="zitat" style="margin-bottom:20px"><div class="zitat"><blockquote>„${esc(d.zitat.text)}"</blockquote><cite>— ${esc(d.zitat.cite)}</cite></div></section>`;
  document.getElementById('paper').innerHTML=html;
  // Kopf + Register + Spy
  document.getElementById('standLabel').textContent=d.stand||'';
  document.getElementById('footStand').textContent='Stand '+(d.stand||'');
  buildTabs(); initSpy();
  __coTicker=(d.unternehmen&&d.unternehmen.ticker)||'';
  fillLive();
}
function buildTabs(){
  const T=[['heisser','Headlines'],['politik','Politik'],['wirtschaft','Wirtschaft'],['unternehmen','Unternehmen d. Tages'],['boerse','Börse'],['sport','Sport'],['promi','Promi'],['film','Film & Streaming'],['genuss','Genuss & Reisen'],['tech','Tech & KI'],['gesundheit','Gesundheit'],['panorama','Panorama'],['podcasts','Podcasts']];
  document.getElementById('tabs').innerHTML=T.map((t,i)=>`<a href="#${t[0]}"${i===0?' class="active"':''}>${t[1]}</a>`).join('');
}
let _obs;
function initSpy(){
  const links=[].slice.call(document.querySelectorAll('#tabs a')); const map={};
  links.forEach(a=>map[a.getAttribute('href').slice(1)]=a);
  if(_obs)_obs.disconnect();
  _obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){links.forEach(l=>l.classList.remove('active'));const a=map[e.target.id];if(a){a.classList.add('active');a.scrollIntoView({inline:'center',block:'nearest'});}}});},{rootMargin:'-30% 0px -60% 0px'});
  document.querySelectorAll('section.ressort').forEach(s=>_obs.observe(s));
}

  }catch(e){/* offline / Tabelle fehlt → Seed bleibt */}
})();
</script>
